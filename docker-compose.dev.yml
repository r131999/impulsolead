version: "3.8"

# Use para desenvolvimento local: docker compose -f docker-compose.dev.yml up
services:
  postgres:
    image: postgres:16-alpine
    container_name: impulso_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pp8i8dwvomtjqtwbk739
      POSTGRES_DB: impulso
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d impulso"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
